---
type: showroom

# Left panel width — 45% gives enough room for instructions + right panel
default_width: 45
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
  - name: Terminal
    path: /terminal
    port: 443
